baseurl: "/valet" # the subpath of your site, e.g. blog/
url: "https://mgoadric.github.io" # the base hostname & protocol for your site, e.g. http://example.com/

title: Valet | Traditional Card Game Testbed
description: >- # this means to ignore newlines until "baseurl:"
  Valet is a diverse and comprehensive testbed of 21 traditional 
  imperfect-information card games. These games span multiple genres, 
  cultures, player counts, deck structures, mechanics, winning 
  conditions, and methods of hiding and revealing information. 
  To standardize implementations across systems, we encode the rules 
  of each game in RECYCLE, a card game description language. 

#################### Comment Section (Disqus) ################
disqus_shortname: "" # Add your shortname for Disqus Comment. For example : mr-brown

# Scss Directory
sass:
  sass_dir: assets/scss
  style: compressed

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll/tagging

paginate: 21
paginate_path: "/page/:num"

# include
include:
  - _pages
  - _authors

# Pages Path
defaults:
  - scope:
      path: "_pages"
    values:
      permalink: /:basename:output_ext

  - scope:
      path: "_authors"
    values:
      permalink: /author/:basename:output_ext
      layout: author

  - scope:
      path: ""
      type: "posts"
    values:
      permalink: post/:title:output_ext
      layout: post

# Tags
tag_page_dir: tag
tag_page_layout: tags
tag_permalink_style: pretty

category_page_dir: tag
category_page_layout: tags


# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
